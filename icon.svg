<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1612"/>
      <stop offset="50%" stop-color="#152a21"/>
      <stop offset="100%" stop-color="#0a1612"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D272"/>
      <stop offset="100%" stop-color="#B8902A"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Aura -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.18"/>

  <!-- Triforce: 3 triangles -->
  <polygon points="256,118 196,222 316,222" fill="url(#gold)"/>
  <polygon points="196,232 136,336 256,336" fill="url(#gold)" opacity="0.92"/>
  <polygon points="316,232 256,336 376,336" fill="url(#gold)" opacity="0.92"/>

  <!-- Sparkles -->
  <circle cx="150" cy="160" r="5" fill="#F2D272" opacity="0.8"/>
  <circle cx="368" cy="170" r="4" fill="#F2D272" opacity="0.7"/>
  <circle cx="120" cy="280" r="3.5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="392" cy="290" r="4.5" fill="#D4AF37" opacity="0.65"/>
  <circle cx="256" cy="80" r="4" fill="#F2D272" opacity="0.75"/>
</svg>
